url: https://worldjusticeproject-org.github.io/WJPr/

authors:
  Santiago Pardo:
    href: https://github.com/aspardog
  World Justice Project - Data Analytics Unit:
    href: https://worldjusticeproject.org

template:
  bootstrap: 5
  bslib:
    primary: "#482d8b"
    secondary: "#2894aa"
    success: "#0f9581"
    info: "#2894aa"
    warning: "#f26b21"
    danger: "#89191c"
    light: "#f7f8fa"
    dark: "#2e1c5c"
    navbar-bg: "#2e1c5c"
    navbar-light-color: "rgba(255,255,255,0.9)"
    navbar-light-active-color: "#ffffff"
    navbar-light-hover-color: "#ffffff"
    link-color: "#482d8b"
    code-color: "#2e1c5c"
    body-color: "#343438"
    toc-color: "#555659"
    toc-font-size: "0.875rem"
    base_font:
      google: "Lato"
    heading_font:
      google: "Lato"
    code_font:
      google: "Fira Code"
  includes:
    in_header: |
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

home:
  title: WJPr - World Justice Project R Package
  description: >
    Data and visualization tools for building World Justice Project charts,
    country-report graphics, and Rule of Law Index analysis in R.

navbar:
  structure:
    left: [intro, reference, functions, articles, development, news]
    right: [search, github]
  components:
    intro:
      text: Home
      href: index.html
    reference:
      text: Reference
      href: reference/index.html
    functions:
      text: Functions
      menu:
      - text: Bars
      - text: wjp_bars()
        href: reference/wjp_bars.html
      - text: wjp_divbars()
        href: reference/wjp_divbars.html
      - text: wjp_groupbars()
        href: reference/wjp_groupbars.html
      - text: wjp_edgebars()
        href: reference/wjp_edgebars.html
      - text: --------
      - text: Dots and Lines
      - text: wjp_dots()
        href: reference/wjp_dots.html
      - text: wjp_lines()
        href: reference/wjp_lines.html
      - text: wjp_slope()
        href: reference/wjp_slope.html
      - text: wjp_dumbbells()
        href: reference/wjp_dumbbells.html
      - text: wjp_lollipops()
        href: reference/wjp_lollipops.html
      - text: --------
      - text: Radial and Special
      - text: wjp_radar()
        href: reference/wjp_radar.html
      - text: wjp_rose()
        href: reference/wjp_rose.html
      - text: wjp_gauge()
        href: reference/wjp_gauge.html
      - text: --------
      - text: Validation and Analysis
      - text: wjp_check_data()
        href: reference/wjp_check_data.html
      - text: wjp_check_deps()
        href: reference/wjp_check_deps.html
      - text: diffmeans()
        href: reference/diffmeans.html
      - text: --------
      - text: Styling
      - text: wjp_fonts()
        href: reference/wjp_fonts.html
      - text: wjp_palette()
        href: reference/wjp_palette.html
      - text: WJP_theme()
        href: reference/WJP_theme.html
    articles:
      text: Guides
      menu:
      - text: Chart Gallery
        href: articles/gallery.html
      - text: Data Preparation
        href: articles/data-preparation.html
      - text: Data Visualization
        href: articles/dataviz.html
    development:
      text: Development
      menu:
      - text: Adding a New Function
        href: articles/add-function.html
      - text: Complete Development Guide
        href: articles/development-guide.html

reference:
- title: Bars
  desc: Functions for vertical, horizontal, diverging, grouped, and edge bar charts.
  contents:
  - wjp_bars
  - wjp_divbars
  - wjp_groupbars
  - wjp_edgebars
- title: Dots and Lines
  desc: Functions for comparing points, trends, slopes, changes, and lollipops.
  contents:
  - wjp_dots
  - wjp_lines
  - wjp_slope
  - wjp_dumbbells
  - wjp_lollipops
- title: Radial and Special
  desc: Functions for radial charts, rose charts, and gauges.
  contents:
  - wjp_radar
  - wjp_rose
  - wjp_gauge
- title: Validation, Analysis, and Styling
  desc: Support tools for validating data, checking dependencies, analyzing differences, and applying WJP styling.
  contents:
  - wjp_check_data
  - wjp_check_deps
  - diffmeans
  - wjp_fonts
  - wjp_palette
  - WJP_theme
- title: Data
  desc: Datasets included in the package.
  contents:
  - gpp
  - roli

articles:
- title: Usage
  navbar: ~
  contents:
  - articles/gallery
  - articles/data-preparation
  - articles/dataviz
- title: Development
  navbar: ~
  contents:
  - articles/add-function
  - articles/development-guide
